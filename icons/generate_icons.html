<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate SoundSwitch Icons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    .icon-container {
      display: inline-block;
      margin: 10px;
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>SoundSwitch Icon Generator</h1>
  <p>Right-click each icon and save as PNG with the corresponding filename:</p>
  
  <div class="icon-container">
    <canvas id="icon16" width="16" height="16"></canvas>
    <label>icon16.png</label>
  </div>
  
  <div class="icon-container">
    <canvas id="icon32" width="32" height="32"></canvas>
    <label>icon32.png</label>
  </div>
  
  <div class="icon-container">
    <canvas id="icon48" width="48" height="48"></canvas>
    <label>icon48.png</label>
  </div>
  
  <div class="icon-container">
    <canvas id="icon128" width="128" height="128"></canvas>
    <label>icon128.png</label>
  </div>

  <script>
    // Function to draw icon
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#ff6b35');
      gradient.addColorStop(1, '#ff4500');
      
      // Draw rounded rectangle background
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.2);
      ctx.fill();
      
      // Draw "S" for SoundSwitch
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.6}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', size / 2, size / 2);
      
      // Add subtle shadow
      ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
      ctx.shadowBlur = size * 0.1;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = size * 0.05;
    }
    
    // Generate all icons
    drawIcon('icon16', 16);
    drawIcon('icon32', 32);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
    
    // Note about Canvas roundRect support
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
      }
    }
  </script>
</body>
</html>
