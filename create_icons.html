<!DOCTYPE html>
<html>
<head>
  <title>Create SoundSwitch Icons</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .icon { display: inline-block; margin: 10px; text-align: center; }
    canvas { border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>SoundSwitch Icon Generator</h1>
  <p>Right-click each icon and "Save image as" with the filename shown below:</p>
  
  <div class="icon">
    <canvas id="icon16" width="16" height="16"></canvas>
    <br>icon16.png
  </div>
  
  <div class="icon">
    <canvas id="icon32" width="32" height="32"></canvas>
    <br>icon32.png
  </div>
  
  <div class="icon">
    <canvas id="icon48" width="48" height="48"></canvas>
    <br>icon48.png
  </div>
  
  <div class="icon">
    <canvas id="icon128" width="128" height="128"></canvas>
    <br>icon128.png
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#ff6b35';
      ctx.fillRect(0, 0, size, size);
      
      // "S" letter
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.6}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', size / 2, size / 2);
    }
    
    drawIcon('icon16', 16);
    drawIcon('icon32', 32);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
